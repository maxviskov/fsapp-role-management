<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Role Detail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0f1117;--surface:#171c26;--surface2:#1e2535;--border:#2a3245;
      --accent:#4f8ef7;--accent2:#38d9a9;--danger:#ff6b6b;--warn:#ffa94d;
      --text:#e8ecf4;--muted:#7a8aaa;
      --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
      --r:6px;--t:150ms ease;
    }
    [data-theme="light"] {
  --bg:#f0f2f7;--surface:#ffffff;--surface2:#e8ebf2;--border:#d0d6e8;
  --text:#1a2035;--muted:#6272a4;--accent:#2563eb;--accent2:#059669;
  --danger:#dc2626;--warn:#d97706;
}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
    #app{display:flex;flex-direction:column;min-height:100vh}

    /* HEADER */
    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:100}
    .logo{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--accent);letter-spacing:2px;text-transform:uppercase;border:1px solid var(--accent);padding:3px 8px;border-radius:3px}
    header h1{font-size:14px;font-weight:500}
    .sp1{flex:1}
    .env{font-family:var(--mono);font-size:10px;color:var(--warn);border:1px solid var(--warn);padding:2px 7px;border-radius:3px}

    /* CONTENT */
    .page{max-width:1100px;margin:0 auto;padding:28px 24px 48px}

    /* ERROR STATE */
    .errstate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px;color:var(--muted)}
    .errstate .ico{font-size:40px;opacity:.3}
    .errstate h2{font-size:16px;font-weight:500;color:var(--danger)}
    .errstate p{font-size:12px;font-family:var(--mono);color:var(--muted)}

    /* LOADING STATE */
    .loading{display:flex;align-items:center;justify-content:center;min-height:60vh;gap:10px;color:var(--muted);font-family:var(--mono);font-size:12px}

    /* ROLE HEADER CARD */
    .role-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:24px;display:flex;align-items:flex-start;gap:32px;flex-wrap:wrap}
    .role-title{display:flex;flex-direction:column;gap:4px}
    .role-id{font-family:var(--mono);font-size:24px;font-weight:600;color:var(--accent)}
    .role-sub{font-size:11px;color:var(--muted)}
    .role-fields{display:flex;gap:28px;flex-wrap:wrap;margin-top:2px}
    .fg{display:flex;flex-direction:column;gap:4px}
    .fl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
    .fv{font-family:var(--mono);font-size:13px}

    /* BADGES */
    .badge{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;letter-spacing:.4px;white-space:nowrap;display:inline-block}
    .b-yes{background:rgba(255,107,107,.15);color:#ff6b6b;border:1px solid rgba(255,107,107,.3)}
    .b-no{background:rgba(56,217,169,.1);color:#38d9a9;border:1px solid rgba(56,217,169,.2)}
    .b-act{background:rgba(56,217,169,.1);color:#38d9a9;border:1px solid rgba(56,217,169,.2)}
    .b-ina{background:rgba(122,138,170,.1);color:var(--muted);border:1px solid var(--border)}
    /* Role_Status badges */
    .b-st-new{background:rgba(79,142,247,.15);color:var(--accent);border:1px solid rgba(79,142,247,.3)}
    .b-st-review{background:rgba(255,169,77,.15);color:var(--warn);border:1px solid rgba(255,169,77,.3)}
    .b-st-active{background:rgba(56,217,169,.1);color:#38d9a9;border:1px solid rgba(56,217,169,.2)}
    .b-st-inactive{background:rgba(122,138,170,.1);color:var(--muted);border:1px solid var(--border)}

    /* SECTION */
    .sh{display:flex;align-items:center;margin-bottom:12px;gap:10px}
    .sh h3{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);flex:1}
    .cb{background:var(--surface2);border:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted);padding:2px 7px;border-radius:10px}

    /* TABLE */
    .tw{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:28px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead th{background:var(--surface2);padding:9px 12px;text-align:left;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);white-space:nowrap}
    tbody tr{border-bottom:1px solid var(--border);transition:background var(--t)}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:rgba(255,255,255,.025)}
    td{padding:9px 12px;vertical-align:middle}
    td.mono{font-family:var(--mono);font-size:11px}
    .trunc{max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lrow td{text-align:center;padding:28px;color:var(--muted);font-family:var(--mono);font-size:11px}

    /* NOTES CELL */
    .notes-cell{max-width:200px;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:help}

    /* PRINT / EXPORT */
    .actions{display:flex;gap:8px;align-items:center}
    .btn{font-family:var(--sans);font-size:12px;font-weight:500;padding:6px 12px;border-radius:var(--r);border:none;cursor:pointer;transition:opacity var(--t),transform var(--t);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
    .btn:hover{opacity:.82;transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .bs{background:var(--surface2);color:var(--text);border:1px solid var(--border)}

    /* SPINNER */
    .spn{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.2);border-top-color:currentColor;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* PRINT STYLES */
    @media print {
      body{background:#fff;color:#000}
      header{background:#fff;border-bottom:1px solid #ccc;position:static}
      .logo{color:#333;border-color:#333}
      .env,.actions{display:none}
      .role-header,.tw{border:1px solid #ccc;background:#fff}
      .fl,.muted{color:#666}
      .role-id{color:#1a4faf}
      thead th{background:#f0f0f0;color:#444}
      tbody tr:hover{background:transparent}
      .badge{print-color-adjust:exact;-webkit-print-color-adjust:exact}
      .page{padding:16px 0}
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">VELCO</span>
    <h1>Role Detail</h1>
    <div class="sp1"></div>
    <div class="actions" id="hdrActions" style="display:none">
      <button class="btn bs" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn bs" onclick="window.print()">⎙ Print</button>
    </div>
    <button class="btn bs" id="themeBtn" onclick="toggleTheme()" style="padding:5px 9px;font-size:13px">☀</button>
    <span class="env">DEV / BETA</span>
  </header>
  <div class="page" id="pageContent">
    <div class="loading"><span class="spn"></span>&nbsp;Loading role…</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  CONFIG — keep in sync with role_master_manager
// ═══════════════════════════════════════════
const CFG = {
  domain:    'velco-betabox.freshservice.com',
  apiKey:    'uloskM4yZXvLPVUdOxyD',
  masterObj: 37000019240,
  entObj:    37000019214,
  yesNoObj:  37000019262,
  statusObj: 37000019266,              // Role_Status lookup object
  yesId: null,
  noId:  null,
};
// Role_Status record IDs (hardcoded — confirmed from object 37000019266)
const ROLE_STATUS = {
  1: { label: 'New',       cls: 'b-st-new'      },
  2: { label: 'In Review', cls: 'b-st-review'   },
  3: { label: 'Active',    cls: 'b-st-active'   },
  4: { label: 'Inactive',  cls: 'b-st-inactive' },
};

function resolveStatus(statusField) {
  if (!statusField) return ROLE_STATUS[1];
  const id = statusField.id ?? statusField;
  return ROLE_STATUS[id] || ROLE_STATUS[1];
}
const BASE = 'https://' + CFG.domain;
const HDR  = { Authorization: 'Basic ' + btoa(CFG.apiKey + ':X'), 'Content-Type': 'application/json' };

const GET = async p => {
  const r = await fetch(BASE + p, { headers: HDR });
  if (!r.ok) throw new Error(`GET ${p} → ${r.status}`);
  return r.json();
};

// ═══════════════════════════════════════════
//  PARSE URL PARAM
// ═══════════════════════════════════════════
function getRoleIdParam() {
  const params = new URLSearchParams(window.location.search);
  return (params.get('role_id') || params.get('roleId') || params.get('role') || '').trim();
}

// ═══════════════════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════════════════
function showError(title, detail) {
  document.getElementById('pageContent').innerHTML = `
    <div class="errstate">
      <div class="ico">⬡</div>
      <h2>${title}</h2>
      <p>${detail}</p>
    </div>`;
}

function badge(val) {
  if (!val) return '<span style="color:var(--muted)">—</span>';
  const v = val.toLowerCase();
  const cls = (v === 'yes') ? 'b-yes' : 'b-no';
  return `<span class="badge ${cls}">${val}</span>`;
}

function activeBadge(val) {
  if (!val) return '<span style="color:var(--muted)">—</span>';
  const v = val.toLowerCase();
  const cls = (v === 'yes') ? 'b-act' : 'b-ina';
  return `<span class="badge ${cls}">${val}</span>`;
}

function statusBadge(statusField) {
  const st = resolveStatus(statusField);
  return `<span class="badge ${st.cls}">${st.label}</span>`;
}

function cell(v) { return v || '<span style="color:var(--muted)">—</span>'; }

function shortName(v) {
  if (!v) return '—';
  const m = v.match(/^(.+?)\s*</);
  return m ? m[1] : v;
}

// ═══════════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════════
async function init() {
  const roleId = getRoleIdParam();

  if (!roleId) {
    showError(
      'No role_id specified',
      'Usage: role_detail.html?role_id=YOUR_ROLE_ID'
    );
    return;
  }

  try {
    // Find the master record by role_id field
    const enc = encodeURIComponent(`role_id : '${roleId}'`);
    const masterData = await GET(`/api/v2/objects/${CFG.masterObj}/records?page_size=10&query=${enc}`);
    const records = masterData.records || [];

    if (!records.length) {
      showError(
        `Role "${roleId}" not found`,
        'Check the role_id parameter or verify this role exists in the system.'
      );
      return;
    }

    const master = records[0];
    const d = master.data || {};

    // Load entitlements in parallel
    const entEnc = encodeURIComponent(`workday_job_profile_id : '${roleId}'`);
    const entData = await GET(`/api/v2/objects/${CFG.entObj}/records?page_size=100&query=${entEnc}`);
    const ents = entData.records || [];

    renderPage(d, master.data.bo_display_id, ents);

    // Show export/print buttons now that we have data
    document.getElementById('hdrActions').style.display = 'flex';

    // Store for CSV export
    window._roleData  = d;
    window._entData   = ents;
    window._roleId    = roleId;

  } catch (e) {
    showError('Failed to load role', e.message);
  }
}

function renderPage(d, recId, ents) {
  const st  = resolveStatus(d.role_status);
  const bv  = d.is_bes?.value    || '—';
  const lc  = d.role_last_changed ? new Date(d.role_last_changed).toLocaleString() : '—';

  const entRows = ents.length
    ? ents.map(r => {
        const e = r.data || {};
        const isBes = (e.entitlement_is_bes?.value || '').toLowerCase() === 'yes';
        return `<tr>
          <td class="mono">${cell(e.entitlement_type?.value)}</td>
          <td class="trunc" title="${e.entitlement_item?.value || ''}">${cell(e.entitlement_item?.value)}</td>
          <td class="trunc" title="${e.physical_access?.value || ''}">${cell(e.physical_access?.value)}</td>
          <td class="trunc" title="${e.location?.value || ''}">${cell(e.location?.value)}</td>
          <td>${badge(e.entitlement_is_bes?.value)}</td>
          <td class="trunc" style="font-size:11px" title="${e.provisioning_owner?.value || ''}">${shortName(e.provisioning_owner?.value)}</td>
          <td class="trunc" style="font-size:11px" title="${e.approval_owner?.value || ''}">${shortName(e.approval_owner?.value)}</td>
          <td class="notes-cell" title="${(e.notes || '').replace(/"/g, '&quot;')}">${cell(e.notes)}</td>
        </tr>`;
      }).join('')
    : `<tr class="lrow"><td colspan="8">No entitlements found for this role</td></tr>`;

  document.getElementById('pageContent').innerHTML = `
    <div class="role-header">
      <div class="role-title">
        <div class="role-id">${d.role_id || '—'}</div>
        <div class="role-sub">Record ID: ${recId} &nbsp;·&nbsp; Last changed: ${lc}</div>
      </div>
      <div class="role-fields">
        <div class="fg">
          <span class="fl">Status</span>
          ${statusBadge(d.role_status)}
        </div>
        <div class="fg">
          <span class="fl">BES</span>
          ${badge(bv)}
        </div>
      </div>
    </div>

    <div class="sh">
      <h3>Entitlements</h3>
      <span class="cb">${ents.length}</span>
    </div>
    <div class="tw">
      <table>
        <thead><tr>
          <th>Type</th>
          <th>Item</th>
          <th>Physical Access</th>
          <th>Location</th>
          <th>BES</th>
          <th>Prov. Owner</th>
          <th>Appr. Owner</th>
          <th>Justification</th>
        </tr></thead>
        <tbody>${entRows}</tbody>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════
//  CSV EXPORT
// ═══════════════════════════════════════════
function exportCSV() {
  const d    = window._roleData  || {};
  const ents = window._entData   || [];
  const rid  = window._roleId    || 'role';

  const headers = [
    'Role ID','Status','BES','Last Changed',
    'Ent Type','Ent Item','Physical Access','Location',
    'Ent BES','Prov. Owner','Appr. Owner','Justification'
  ];

  const lc = d.role_last_changed ? new Date(d.role_last_changed).toLocaleString() : '';
  const st = resolveStatus(d.role_status);
  const baseInfo = [
    csv(d.role_id), csv(st.label), csv(d.is_bes?.value), csv(lc)
  ];

  let rows;
  if (ents.length) {
    rows = ents.map(r => {
      const e = r.data || {};
      return [
        ...baseInfo,
        csv(e.entitlement_type?.value),
        csv(e.entitlement_item?.value),
        csv(e.physical_access?.value),
        csv(e.location?.value),
        csv(e.entitlement_is_bes?.value),
        csv(e.provisioning_owner?.value),
        csv(e.approval_owner?.value),
        csv(e.notes),
      ].join(',');
    });
  } else {
    rows = [[...baseInfo, '', '', '', '', '', '', '', ''].join(',')];
  }

  const content = [headers.join(','), ...rows].join('\r\n');
  const blob = new Blob([content], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `role_${rid}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function csv(v) {
  if (v == null || v === '') return '';
  return '"' + String(v).replace(/"/g, '""') + '"';
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
init();
function toggleTheme() {
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  document.getElementById('themeBtn').textContent = next === 'light' ? '☾' : '☀';
  localStorage.setItem('velco-theme', next);
}
// Apply saved preference on load
(function() {
  const saved = localStorage.getItem('velco-theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('themeBtn').textContent = '☾';
    });
  }
})();
</script>
</body>
</html>
